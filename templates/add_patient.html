{% extends "base.html" %}
{% block title %}Add New Patient{% endblock %}

{% block content %}
<h2>Add New Patient</h2>
<form method="POST" action="{{ url_for('add_patient') }}">
  <div class="mb-3">
    <label for="first_name" class="form-label">First Name <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="first_name" name="first_name" required>
  </div>
  <div class="mb-3">
    <label for="last_name" class="form-label">Last Name <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="last_name" name="last_name" required>
  </div>

  <div class="mb-3">
    <label for="dob" class="form-label">Date of Birth</label>
    <input type="date" class="form-control" id="dob" name="dob">
  </div>
  <div class="mb-3">
    <label for="phone" class="form-label">Phone</label>
    <input type="tel" class="form-control" id="phone" name="phone">
  </div>

  <div class="mb-3">
    <label for="address" class="form-label">Address</label>
    <input type="text" class="form-control" id="address" name="address">
  </div>
  <div class="mb-3">
    <label for="city" class="form-label">City</label>
    <input type="text" class="form-control" id="city" name="city">
  </div>
  <div class="mb-3">
    <label for="state" class="form-label">State</label>
    <input type="text" class="form-control" id="state" name="state" maxlength="2" placeholder="e.g. CA">
  </div>
  <div class="mb-3">
    <label for="zip_code" class="form-label">Zip Code</label>
    <input type="text" class="form-control" id="zip_code" name="zip_code" maxlength="10">
  </div>

  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" name="email">
  </div>

  <div class="mb-3">
    <label for="insurance" class="form-label">Insurance</label>
    <select class="form-select" id="insurance" name="insurance">
      <option value="">-- Select --</option>
      {% for insurance in insurances %}
      <option value="{{ insurance.id }}">{{ insurance.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label for="physician" class="form-label">Physician</label>
    <select class="form-select" id="physician" name="physician">
      <option value="">-- Select --</option>
      {% for physician in physicians %}
      <option value="{{ physician.id }}">{{ physician.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label for="mrn" class="form-label">Medical Record Number</label>
    <input type="text" class="form-control" id="mrn" name="mrn" readonly value="{{ generated_mrn }}">
  </div>

  <div class="mb-3">
    <label for="other_notes" class="form-label">Other Notes</label>
    <textarea class="form-control" id="other_notes" name="other_notes" rows="3"></textarea>
  </div>

  <button type="submit" class="btn btn-primary">Save Patient</button>
  <a href="{{ url_for('patients_list') }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
