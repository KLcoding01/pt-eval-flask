{% extends 'base.html' %}
{% block content %}
<div class="container-fluid">
  <ul class="nav nav-tabs" id="pt-inner-tab" role="tablist">
    <li class="nav-item"><a class="nav-link active" id="tab1-link" data-bs-toggle="tab" href="#tab1" role="tab">Patient Info</a></li>
    <li class="nav-item"><a class="nav-link" id="tab2-link" data-bs-toggle="tab" href="#tab2" role="tab">History</a></li>
    <li class="nav-item"><a class="nav-link" id="tab3-link" data-bs-toggle="tab" href="#tab3" role="tab">Pain</a></li>
  </ul>
  <div class="tab-content mt-2">
    <div class="tab-pane fade show active" id="tab1" role="tabpanel">
      <input class="form-control mb-2" placeholder="Patient Name">
      <input class="form-control mb-2" placeholder="Current Date">
    </div>
    <div class="tab-pane fade" id="tab2" role="tabpanel">
      <textarea class="form-control mb-2" placeholder="Medical History"></textarea>
      <textarea class="form-control mb-2" placeholder="Subjective"></textarea>
    </div>
    <div class="tab-pane fade" id="tab3" role="tabpanel">
      <input class="form-control mb-2" placeholder="Pain Location">
      <input class="form-control mb-2" placeholder="Pain Rating">
    </div>
  </div>
</div>
{% endblock %}
