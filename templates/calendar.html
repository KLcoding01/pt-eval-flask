<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FullCalendar Resource TimeGrid Example</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- FullCalendar CSS from CDN -->
  <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/index.global.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/resource-timegrid@6.1.11/index.global.min.css" rel="stylesheet" />
  <style>
    body { margin: 40px 10px; font-family: Arial, Helvetica Neue, Helvetica, sans-serif; font-size: 14px; }
    #calendar { max-width: 1100px; margin: 0 auto; }
  </style>
</head>
<body>
  <h1>Clinic Resource Calendar</h1>
  <div id="calendar"></div>
  <!-- FullCalendar JS from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/interaction@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/resource-timegrid@6.1.11/index.global.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var calendarEl = document.getElementById('calendar');
      var calendar = new FullCalendar.Calendar(calendarEl, {
        plugins: [ FullCalendarInteraction, FullCalendarResourceTimegrid ],
        schedulerLicenseKey: 'CC-Attribution-NonCommercial-NoDerivatives',
        initialView: 'resourceTimeGridWeek',
        nowIndicator: true,
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'resourceTimeGridDay,resourceTimeGridWeek'
        },
        resources: [
          { id: 'a', title: 'Therapist A' },
          { id: 'b', title: 'Therapist B' }
        ],
        events: [
          { id: 1, resourceId: 'a', start: '2023-07-02T09:00:00', end: '2023-07-02T10:00:00', title: 'Eval' },
          { id: 2, resourceId: 'b', start: '2023-07-02T10:00:00', end: '2023-07-02T11:00:00', title: 'Re-eval' }
        ]
      });
      calendar.render();
    });
  </script>
</body>
</html>
