<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clinic Google Calendar Scheduler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- FullCalendar CSS from CDN -->
  <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/index.global.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/timegrid@6.1.11/index.global.min.css" rel="stylesheet" />
  <style>
    body { margin: 40px 10px; font-family: Arial, Helvetica Neue, Helvetica, sans-serif; font-size: 14px; }
    #calendar { max-width: 1100px; margin: 0 auto; }
    #google-auth-btn { display: block; margin: 12px auto; }
  </style>
</head>
<body>
  <h1>Clinic Google Calendar Scheduler</h1>
  <button id="google-auth-btn" onclick="window.location.href='/authorize'">Connect Google Calendar</button>
  <div id="calendar"></div>
  <!-- FullCalendar JS from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/interaction@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/timegrid@6.1.11/index.global.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var calendarEl = document.getElementById('calendar');
      var calendar = new FullCalendar.Calendar(calendarEl, {
        plugins: [ FullCalendarInteraction, FullCalendarTimeGrid ],
        initialView: 'timeGridWeek',
        nowIndicator: true,
        selectable: true,
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'timeGridDay,timeGridWeek'
        },
        events: '/api/google-events',
        select: function(info) {
          var title = prompt('Visit Title (Patient Name)?');
          if (title) {
            // Create event in Google Calendar via Flask
            fetch('/api/schedule', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                title: title,
                start: info.startStr,
                end: info.endStr
              })
            })
            .then(response => response.json())
            .then(data => {
              if(data.result === 'ok') {
                calendar.refetchEvents();
                alert('Event scheduled!');
              } else {
                alert('Failed: ' + (data.error || 'Unknown error'));
              }
            });
          }
          calendar.unselect();
        }
      });
      calendar.render();
    });
  </script>
</body>
</html>
