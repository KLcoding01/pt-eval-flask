<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clinic Google Calendar Scheduler</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #connect-btn {
            padding: 8px 20px;
            margin-top: 20px;
            font-size: 1rem;
            border-radius: 5px;
            background: #4285F4;
            color: white;
            border: none;
            cursor: pointer;
        }
        #connect-btn:hover {
            background: #3367D6;
        }
    </style>
</head>
<body>
    <h1>Clinic Google Calendar Scheduler</h1>
    <button id="connect-btn">Connect Google Calendar</button>

    <script>
        document.getElementById('connect-btn').onclick = function() {
            // Redirect to your Flask OAuth2 "authorize" route
            window.location.href = "{{ url_for('authorize') }}";
        };
    </script>
</body>
</html>
