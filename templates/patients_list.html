{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>Therapist Roster</h2>
    <a href="{{ url_for('therapists_add') }}" class="btn btn-primary mb-3">Add Therapist</a>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Credentials</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for t in therapists %}
            <tr>
                <td>{{ t.first_name }} {{ t.last_name }}</td>
                <td>{{ t.credentials }}</td>
                <td>{{ t.phone }}</td>
                <td>{{ t.email }}</td>
                <td>
                    <a href="{{ url_for('therapists_edit', therapist_id=t.id) }}" class="btn btn-sm btn-secondary">Edit</a>
                </td>
            </tr>
        {% else %}
            <tr><td colspan="5" class="text-center">No therapists found.</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
