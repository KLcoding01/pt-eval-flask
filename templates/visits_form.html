{% extends "base.html" %}
{% block title %}New Visit{% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>New Visit</h2>
  <form method="POST">
    <div class="mb-3">
      <label for="patient_id" class="form-label">Patient</label>
      <select name="patient_id" id="patient_id" class="form-select" required>
        <option value="">Select</option>
        {% for patient in patients %}
          <option value="{{ patient.id }}">{{ patient.first_name }} {{ patient.last_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label for="therapist_id" class="form-label">Therapist</label>
      <select name="therapist_id" id="therapist_id" class="form-select" required>
        <option value="">Select</option>
        {% for therapist in therapists %}
          <option value="{{ therapist.id }}">{{ therapist.first_name }} {{ therapist.last_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label for="visit_date" class="form-label">Visit Date & Time</label>
      <input type="datetime-local" name="visit_date" id="visit_date" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="end_time" class="form-label">End Time</label>
      <input type="datetime-local" name="end_time" id="end_time" class="form-control">
    </div>
    <div class="mb-3">
      <label for="duration" class="form-label">Duration (minutes)</label>
      <input type="number" name="duration" id="duration" class="form-control" value="60">
    </div>
    <div class="mb-3">
      <label for="visit_type" class="form-label">Visit Type</label>
      <select name="visit_type" id="visit_type" class="form-select" required>
        <option value="">Select</option>
        <option>Evaluation</option>
        <option>Visit</option>
        <option>Progress Note</option>
        <option>Discharge</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="status" class="form-label">Status</label>
      <select name="status" id="status" class="form-select">
        <option value="Scheduled">Scheduled</option>
        <option value="Completed">Completed</option>
        <option value="Cancelled">Cancelled</option>
        <option value="No Show">No Show</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="notes" class="form-label">Notes</label>
      <textarea name="notes" id="notes" class="form-control"></textarea>
    </div>
    <button type="submit" class="btn btn-success">Save Visit</button>
  </form>
</div>
{% endblock %}
