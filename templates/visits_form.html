{% extends "base.html" %}
{% block title %}{{ 'Edit' if edit else 'New' }} Visit{% endblock %}
{% block content %}
<h2>{{ 'Edit' if edit else 'New' }} Visit</h2>
<form method="POST">
  <div class="mb-3">
    <label for="patient_id" class="form-label">Patient</label>
    <select name="patient_id" class="form-select" required>
      {% for p in patients %}
      <option value="{{ p.id }}" {% if visit and visit.patient_id == p.id %}selected{% endif %}>
        {{ p.first_name }} {{ p.last_name }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label for="therapist_id" class="form-label">Therapist</label>
    <select name="therapist_id" class="form-select" required>
      {% for t in therapists %}
      <option value="{{ t.id }}" {% if visit and visit.therapist_id == t.id %}selected{% endif %}>
        {{ t.first_name }} {{ t.last_name }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Visit Type</label>
    <input name="visit_type" class="form-control" required value="{{ visit.visit_type if visit else '' }}">
  </div>
  <div class="mb-3">
    <label>Date</label>
    <input type="date" name="visit_date" class="form-control" required value="{{ visit.visit_date.strftime('%Y-%m-%d') if visit else '' }}">
  </div>
  <div class="mb-3">
    <label>Time</label>
    <input type="time" name="visit_time" class="form-control" required value="{{ visit.visit_date.strftime('%H:%M') if visit else '' }}">
  </div>
  <div class="mb-3">
    <label>Status</label>
    <select name="status" class="form-select">
      {% for s in ['Scheduled', 'Arrived', 'Completed', 'Cancelled', 'No Show'] %}
      <option value="{{ s }}" {% if visit and visit.status == s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn-success">Save</button>
  <a href="{{ url_for('visits_list') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
