{% extends "base.html" %}

{% block head_extra %}
<!-- FullCalendar CSS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f5f7fa;
    overflow-x: hidden;
  }
  /* Sidebar styles */
  .sidebar {
    height: 100vh;
    background: white;
    border-right: 1px solid #e0e0e0;
    padding: 1.5rem 1rem;
    position: fixed;
    width: 220px;
    top: 56px; /* navbar height */
    left: 0;
    transition: transform 0.3s ease;
    z-index: 1030;
  }
  .sidebar.hidden {
    transform: translateX(-100%);
  }
  .sidebar h5 {
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: #2c3e50;
  }
  .sidebar .nav-link {
    color: #4a4a4a;
    font-weight: 600;
    padding: 0.75rem 1rem;
    border-radius: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: background-color 0.2s ease, color 0.2s ease;
  }
  .sidebar .nav-link:hover {
    background-color: #007bff;
    color: white;
    text-decoration: none;
  }
  .sidebar .nav-link .icon {
    font-size: 1.3rem;
    flex-shrink: 0;
  }
  .sidebar .logout-btn {
    margin-top: 2rem;
    width: 100%;
    font-weight: 700;
    border-radius: 0.5rem;
    padding: 0.6rem;
  }

  /* Main content */
  main.content {
    margin-left: 220px;
    padding: 2rem;
    min-height: calc(100vh - 56px);
    background: white;
    box-shadow: 0 0 15px rgb(0 0 0 / 0.05);
    border-radius: 1rem;
    max-width: 900px;
    margin-top: 56px;
  }

  /* Navbar */
  .navbar-custom {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1040;
    background-color: #004080;
    color: white;
  }
  .navbar-custom .navbar-brand {
    color: white;
    font-weight: 700;
  }
  .navbar-toggler {
    border-color: rgba(255, 255, 255, 0.7);
  }
  .navbar-toggler-icon {
    filter: invert(1);
  }

  /* Responsive adjustments */
  @media (max-width: 768px) {
    .sidebar {
      transform: translateX(-100%);
      position: fixed;
      top: 56px;
      height: calc(100vh - 56px);
      width: 220px;
    }
    main.content {
      margin-left: 0;
      max-width: 100%;
      margin-top: 56px;
      padding: 1rem;
    }
    .sidebar.show {
      transform: translateX(0);
      box-shadow: 2px 0 8px rgba(0,0,0,0.15);
    }
  }
</style>
{% endblock %}

{% block content %}
<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <button class="navbar-toggler" type="button" aria-label="Toggle navigation" id="sidebarToggle">
      <span class="navbar-toggler-icon"></span>
    </button>
    <a class="navbar-brand ms-3" href="#">PT EMR Dashboard</a>
  </div>
</nav>

<div class="sidebar d-flex flex-column" id="sidebar">
  <h5>Quick Links</h5>
  <a href="{{ url_for('patient_list') }}" class="nav-link">
    <span class="icon">👨‍⚕️</span> Patient List
  </a>
  <a href="{{ url_for('calendar') }}" class="nav-link">
    <span class="icon">📅</span> Calendar
  </a>
  <a href="{{ url_for('uploads') }}" class="nav-link">
    <span class="icon">📤</span> Uploads
  </a>
  <button onclick="location.href='{{ url_for('logout') }}'" class="btn btn-danger logout-btn mt-auto">
    Logout
  </button>
</div>

<main class="content">
  <h2>Calendar</h2>
  <div id="calendar" style="min-height: 600px;"></div>
</main>

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
      },
      events: '/api/appointments', // fetch events from your Flask backend
      height: 'auto',
      editable: true,
      selectable: true,
      selectMirror: true,
      dayMaxEvents: true,
      eventDrop: function(info) {
        // handle event drag & drop update here if you want
        // e.g. send PUT to /api/appointments/:id with new date info
      }
    });

    calendar.render();
  });

  // Sidebar toggle for mobile
  const sidebarToggle = document.getElementById('sidebarToggle');
  const sidebar = document.getElementById('sidebar');

  sidebarToggle.addEventListener('click', () => {
    sidebar.classList.toggle('show');
  });

  // Hide sidebar when clicking outside on mobile
  document.addEventListener('click', (e) => {
    if(window.innerWidth <= 768){
      if(!sidebar.contains(e.target) && !sidebarToggle.contains(e.target)){
        sidebar.classList.remove('show');
      }
    }
  });
</script>
{% endblock %}
