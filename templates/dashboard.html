<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Clinic Scheduler{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% block head %}{% endblock %}
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
    }
    .navbar {
      background: #2176ff;
      color: #fff;
      padding: 0 28px;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .navbar-brand {
      font-weight: bold;
      font-size: 1.2rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 1px;
    }
    .navbar-links a {
      color: #fff;
      text-decoration: none;
      margin-left: 24px;
      font-size: 1rem;
      transition: color 0.15s;
    }
    .navbar-links a:hover {
      color: #ffe066;
    }
    .navbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="{{ url_for('dashboard') }}">Clinic Scheduler</a>
    <div class="navbar-links">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('patients_list') }}">Patients</a>
      <a href="{{ url_for('therapists_list') }}">Therapists</a>
      <a href="{{ url_for('physicians_list') }}">Physicians</a>
      <a href="{{ url_for('insurance_list') }}">Insurance</a>
      <a href="{{ url_for('billing_overview') }}">Billing</a>
      <a href="{{ url_for('pt_builder') }}">PT Builder</a>
      <!-- Remove 'Calendar' link, since calendar is now on dashboard -->
    </div>
    <div class="navbar-right">
      <a href="{{ url_for('logout') }}" style="margin-left:32px;font-weight:600;">Logout</a>
    </div>
  </nav>

    {% if messages %}

        {% for category, message in messages %}
          <div style="margin-bottom:8px;padding:12px;border-radius:6px;color:#fff;
            background:{% if category=='success' %}#27ae60{% elif category=='info' %}#2980b9
            {% elif category
