{% extends "base.html" %}
{% block title %}Dashboard - Clinic Scheduler{% endblock %}

{% block head %}
  <!-- FullCalendar CSS & JS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <style>
    #calendar {
      max-width: 1200px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      min-height: 84vh;
      transition: box-shadow 0.2s;
    }
    #calendar:focus-within, #calendar:active {
      box-shadow: 0 4px 20px rgba(33, 118, 255, 0.15);
    }
    @media (max-width: 900px) {
      #calendar { max-width: 100vw; padding: 8px; margin: 20px auto; }
    }
    h2 {
      margin-top: 32px;
      text-align: center;
      color: #2176ff;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
{% endblock %}

{% block content %}
  <h2>Clinic Google Calendar Scheduler</h2>
  <div id="calendar" tabindex="0"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var calendarEl = document.getElementById('calendar');
      var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        selectable: true,
        editable: true,
        height: "auto",
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: '/api/events', // Your Flask route serving JSON events
        loading: function(isLoading) {
          calendarEl.style.opacity = isLoading ? 0.5 : 1;
        },
        eventClick: function(info) {
          alert('Event: ' + info.event.title);
          // Optional: implement custom modal or details popup here
        }
      });
      calendar.render();
    });
  </script>
{% endblock %}
