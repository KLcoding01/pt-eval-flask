{% extends "base.html" %}
{% block title %}Dashboard - Clinic Scheduler{% endblock %}

{% block head %}
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <style>
    .calendar-container {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      max-width: 1200px;
      margin: 40px auto;
    }
    .single-calendar {
      flex: 1;
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      min-height: 600px;
    }
    h3 {
      text-align: center;
      margin-bottom: 10px;
      color: #2176ff;
    }
  </style>
{% endblock %}

{% block content %}
  <h2 style="text-align:center; color:#2176ff;">Clinic Google Calendar Scheduler - Multi Therapist View</h2>
  <div style="max-width: 1200px; margin: 0 auto; margin-bottom: 20px;">
    <label for="view-date">Select Date: </label>
    <input type="date" id="view-date" />
  </div>
  <div class="calendar-container" id="calendar-container">
    <!-- Calendars will be inserted here -->
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      const container = document.getElementById('calendar-container');
      const viewDateInput = document.getElementById('view-date');

      // Fetch therapist list (limit to 3 for demo)
      const therapistResponse = await fetch('/api/therapist_list');
      const therapists = await therapistResponse.json();

      // Pick first 3 therapists or fewer
      const therapistsToShow = therapists.slice(0, 3);

      // Set input date to today
      const todayStr = new Date().toISOString().slice(0, 10);
      viewDateInput.value = todayStr;

      // Create a calendar for each therapist
      const calendars = [];

      therapistsToShow.forEach(therapist => {
        const div = document.createElement('div');
        div.className = 'single-calendar';
        div.innerHTML = `<h3>${therapist.first_name} ${therapist.last_name}</h3><div id="calendar-${therapist.id}"></div>`;
        container.appendChild(div);

        const calendarEl = div.querySelector(`#calendar-${therapist.id}`);

        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'timeGridDay',
          height: 600,
          allDaySlot: false,
          slotMinTime: "07:00:00",
          slotMaxTime: "19:00:00",
          headerToolbar: {
            left: '',
            center: 'title',
            right: ''
          },
          events: function(fetchInfo, successCallback, failureCallback) {
            fetch(`/api/events?therapist_id=${therapist.id}`)
              .then(res => res.json())
              .then(events => {
                // Filter events by the selected date only
                const selectedDate = viewDateInput.value;
                const filteredEvents = events.filter(ev => ev.start.startsWith(selectedDate));
                successCallback(filteredEvents);
              })
              .catch(err => failureCallback(err));
          },
          editable: false,
          selectable: false,
          nowIndicator: true,
          slotLabelFormat: { hour: 'numeric', minute: '2-digit', hour12: true }
        });

        calendars.push(calendar);
        calendar.render();
      });

      // Sync all calendars when date changes
      viewDateInput.addEventListener('change', () => {
        calendars.forEach(cal => {
          cal.gotoDate(viewDateInput.value);
          cal.refetchEvents();
        });
      });

      // Initial load: sync calendars to today
      calendars.forEach(cal => {
        cal.gotoDate(todayStr);
        cal.refetchEvents();
      });
    });
  </script>
{% endblock %}
