{% extends "base.html" %}
{% block title %}Add Visit{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Add Visit</h2>
    <form method="POST">
        <!-- Patient Search -->
        <div class="mb-3">
            <label for="patient_search" class="form-label">Patient</label>
            <input type="text" id="patient_search" class="form-control" autocomplete="off">
            <input type="hidden" name="patient_id" id="patient_id">
            <div id="patient_results" class="list-group"></div>
        </div>
        <!-- Therapist Dropdown -->
        <div class="mb-3">
            <label for="therapist_id" class="form-label">Therapist</label>
            <select id="therapist_id" name="therapist_id" class="form-select" required>
                <option value="">Select</option>
                {% for t in therapists %}
                  <option value="{{ t.id }}">{{ t.first_name }} {{ t.last_name }}</option>
                {% endfor %}
            </select>
        </div>
        <!-- Visit Date/Time -->
        <div class="mb-3">
            <label for="visit_date" class="form-label">Start Date & Time</label>
            <input type="datetime-local" id="visit_date" name="visit_date" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="end_time" class="form-label">End Date & Time (optional)</label>
            <input type="datetime-local" id="end_time" name="end_time" class="form-control">
        </div>
        <!-- Duration -->
        <div class="mb-3">
            <label for="duration" class="form-label">Duration (minutes, optional)</label>
            <input type="number" id="duration" name="duration" class="form-control" value="60">
        </div>
        <!-- Visit Type -->
        <div class="mb-3">
            <label for="visit_type" class="form-label">Type of Visit</label>
            <select id="visit_type" name="visit_type" class="form-select" required>
                <option value="">Select</option>
                <option>Evaluation</option>
                <option>Visit</option>
                <option>Progress Note</option>
                <option>Discharge</option>
            </select>
        </div>
        <!-- Status -->
        <div class="mb-3">
            <label for="status" class="form-label">Status</label>
            <select id="status" name="status" class="form-select">
                <option value="Scheduled">Scheduled</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
                <option value="No Show">No Show</option>
            </select>
        </div>
        <!-- Notes -->
        <div class="mb-3">
            <label for="notes" class="form-label">Notes (optional)</label>
            <textarea id="notes" name="notes" class="form-control"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Add Visit</button>
    </form>
</div>
<script>
document.getElementById('patient_search').addEventListener('input', function() {
    const q = this.value;
    const resultsDiv = document.getElementById('patient_results');
    if (q.length < 2) { resultsDiv.innerHTML = ''; return; }
    fetch('/api/patient_search?q=' + encodeURIComponent(q))
        .then(r => r.json())
        .then(data => {
            resultsDiv.innerHTML = '';
            data.forEach(item => {
                const option = document.createElement('button');
                option.type = 'button';
                option.className = 'list-group-item list-group-item-action';
                option.textContent = item.label;
                option.onclick = () => {
                    document.getElementById('patient_id').value = item.id;
                    document.getElementById('patient_search').value = item.label;
                    resultsDiv.innerHTML = '';
                };
                resultsDiv.appendChild(option);
            });
        });
});
</script>
{% endblock %}
