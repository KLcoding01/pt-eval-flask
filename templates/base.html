<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PT EMR</title>
  
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
    }
    /* Sidebar styling */
    .sidebar {
      height: 100vh;
      background: white;
      border-right: 1px solid #e0e0e0;
      padding: 1.5rem 1rem;
      width: 220px;
      min-height: 100vh;
    }
    .sidebar h4 {
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #2c3e50;
    }
    .sidebar .nav-link {
      color: #4a4a4a;
      font-weight: 600;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    .sidebar .nav-link:hover {
      background-color: #007bff;
      color: white;
      text-decoration: none;
    }
    .sidebar hr {
      margin: 1.5rem 0;
      border-color: #dee2e6;
    }
  </style>

  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="d-flex">
    <!-- Sidebar -->
    <nav class="sidebar d-flex flex-column">
      <h4>🏥 PT EMR</h4>
      <ul class="nav flex-column mb-3">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">🏠 Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('patient_list') }}">🧍 Patient List</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('calendar') }}">📅 Calendar</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('pt_eval') }}">📝 PT Eval Builder</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('uploads') }}">📤 Uploads</a></li>
      </ul>
      <hr>
      <a class="btn btn-outline-danger btn-sm mt-auto" href="{{ url_for('logout') }}">Logout</a>
    </nav>

    <!-- Main content -->
    <main class="flex-grow-1 p-4">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert alert-info">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Bootstrap & signature-pad scripts (only once here) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.6/dist/signature_pad.umd.min.js"></script>
</body>
</html>
