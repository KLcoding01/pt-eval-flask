{% extends "base.html" %}
{% block title %}Dashboard - Clinic Scheduler{% endblock %}

{% block head %}
  <style>
    .dashboard-main {
      width: 100%;
      min-height: 80vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .calendar-box {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(33,118,255,0.10);
      padding: 16px;
      margin-bottom: 32px;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 70vh;
      overflow: hidden;
    }
    .calendar-title {
      font-size: 1.35rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: #2176ff;
      letter-spacing: 0.03em;
    }
    .calendar-embed-wrapper {
      flex: 1 1 auto;
      min-height: 60vh;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #e9f0ff;
      display: flex;
      align-items: stretch;
    }
    .calendar-iframe {
      border: 0;
      width: 100%;
      height: 100%;
      min-height: 65vh;
      min-width: 100%;
      background: #e9f0ff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(33,118,255,0.04);
    }
    @media (max-width: 800px) {
      .calendar-box {
        padding: 6px;
        border-radius: 12px;
      }
      .calendar-title {
        font-size: 1rem;
        margin-bottom: 8px;
      }
      .calendar-embed-wrapper {
        min-height: 55vh;
        border-radius: 8px;
      }
    }
  </style>
{% endblock %}

{% block content %}
<div class="dashboard-main">
  <div class="calendar-box">
    <div class="calendar-title">
      Clinic Schedule (Google Calendar)
    </div>
    <div class="calendar-embed-wrapper">
      <!-- Change the src below to YOUR Google Calendar embed link! -->
      <iframe
        class="calendar-iframe"
        src="https://calendar.google.com/calendar/embed?src=your_calendar_id%40group.calendar.google.com&ctz=America%2FLos_Angeles"
        frameborder="0"
        scrolling="no">
      </iframe>
    </div>
  </div>
  <!-- Example space for dashboard widgets, KPIs, etc.
  <div class="stats-row">
    <div class="stat-card">Total Visits: {{ total_visits }}</div>
    <div class="stat-card">Total Patients: {{ total_patients }}</div>
    <div class="stat-card">Billing YTD: ${{ total_billing }}</div>
  </div>
  -->
</div>
{% endblock %}
