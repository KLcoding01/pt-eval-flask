<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PT EMR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="d-flex">
    <!-- Sidebar -->
    <div class="bg-light border-end p-3" style="width: 220px; min-height:100vh">
      <h4 class="mb-4">🏥 PT EMR</h4>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">🏠 Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('patient_list') }}">🧍 Patient List</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('calendar') }}">📅 Calendar</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('pt_eval') }}">📝 PT Eval Builder</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('uploads') }}">📤 Uploads</a></li>
      </ul>
      <hr>
      <a class="btn btn-outline-danger btn-sm" href="{{ url_for('logout') }}">Logout</a>
    </div>

    <!-- Main content -->
    <div class="flex-grow-1 p-4">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert alert-info">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
  </div>

  <!-- Bootstrap & signature-pad scripts (only once here) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.6/dist/signature_pad.umd.min.js"></script>
</body>
</html>
