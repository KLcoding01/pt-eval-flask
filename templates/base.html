<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Clinic Scheduler{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% block head %}{% endblock %}
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px;
    }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div id="flashes" style="max-width:600px;margin:20px auto;">
        {% for category, message in messages %}
          <div style="margin-bottom:8px;padding:12px;border-radius:6px;color:#fff;
            background:{% if category=='success' %}#27ae60{% elif category=='info' %}#2980b9
            {% elif category=='danger' %}#c0392b{% elif category=='warning' %}#f39c12{% else %}#222{% endif %};">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</body>
</html>
