<body>
<div class="d-flex">
  <!-- Sidebar -->
  <div class="bg-light border-end p-3" style="width: 220px; min-height: 100vh;">
    <h4 class="mb-4">🏥 PT EMR</h4>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">🏠 Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="{{ url_for('patient_list') }}">🧍 Patient List</a></li>
      <li class="nav-item"><a class="nav-link" href="/calendar">📅 Calendar</a></li>
      <li class="nav-item"><a class="nav-link" href="/pt-eval">📝 PT Eval Builder</a></li>
      <li class="nav-item"><a class="nav-link" href="/uploads">📤 Uploads</a></li>
    </ul>
    <hr>
    <a class="btn btn-outline-danger btn-sm mt-3" href="{{ url_for('logout') }}">Logout</a>
  </div>

  <!-- Main Content -->
  <div class="p-4 flex-grow-1">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-info">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</div>
</body>
