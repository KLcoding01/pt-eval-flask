<h3>Evaluations & Visits</h3>
<table class="table">
  <thead>
    <tr>
      <th>Date</th>
      <th>Type</th>
      <th>Status</th>
      <th>Therapist</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for visit in patient.visits %}
      <tr>
        <td>{{ visit.visit_date.strftime('%Y-%m-%d') if visit.visit_date else '' }}</td>
        <td>{{ visit.visit_type or '' }}</td>
        <td>{{ visit.status or '' }}</td>
        <td>{{ visit.therapist.first_name }} {{ visit.therapist.last_name }}</td>
        <td>
          <a href="{{ url_for('view_visit', visit_id=visit.id) }}" class="btn btn-sm btn-outline-primary">View</a>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
