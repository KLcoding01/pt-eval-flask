{% extends "base.html" %}
{% block title %}Add Visit{% endblock %}

{% block content %}
<h2>Add Visit</h2>
<form method="POST">
  <div class="mb-3">
    <label for="patient_id" class="form-label">Patient</label>
    <select class="form-select" name="patient_id" id="patient_id" required>
      <option value="">Select Patient</option>
      {% for p in patients %}
        <option value="{{ p.id }}">{{ p.last_name }}, {{ p.first_name }} (DOB: {{ p.dob }})</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label for="therapist_id" class="form-label">Therapist</label>
    <select class="form-select" name="therapist_id" id="therapist_id" required>
      <option value="">Select Therapist</option>
      {% for t in therapists %}
        <option value="{{ t.id }}">{{ t.last_name }}, {{ t.first_name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label for="visit_date" class="form-label">Visit Start</label>
    <input type="datetime-local" class="form-control" name="visit_date" id="visit_date" required>
  </div>
  <div class="mb-3">
    <label for="end_time" class="form-label">Visit End</label>
    <input type="datetime-local" class="form-control" name="end_time" id="end_time">
  </div>
  <div class="mb-3">
    <label for="duration" class="form-label">Duration (minutes)</label>
    <input type="number" class="form-control" name="duration" id="duration" min="1" value="60">
  </div>
  <div class="mb-3">
    <label for="visit_type" class="form-label">Visit Type</label>
    <select class="form-select" name="visit_type" id="visit_type" required>
      <option value="">Select type</option>
      <option value="Evaluation">Evaluation</option>
      <option value="Progress Note">Progress Note</option>
      <option value="Visit">Visit</option>
      <option value="Discharge">Discharge</option>
    </select>
  </div>
  <div class="mb-3">
    <label for="status" class="form-label">Status</label>
    <select class="form-select" name="status" id="status" required>
      <option value="Scheduled">Scheduled</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </div>
  <div class="mb-3">
    <label for="cpt_code_id" class="form-label">CPT Code (optional)</label>
    <select class="form-select" name="cpt_code_id" id="cpt_code_id">
      <option value="">None</option>
      {% for c in cpt_codes %}
        <option value="{{ c.id }}">{{ c.code }} - {{ c.description }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label for="icd10_code_id" class="form-label">ICD-10 Code (optional)</label>
    <select class="form-select" name="icd10_code_id" id="icd10_code_id">
      <option value="">None</option>
      {% for i in icd10_codes %}
        <option value="{{ i.id }}">{{ i.code }} - {{ i.description }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label for="notes" class="form-label">Notes</label>
    <textarea class="form-control" name="notes" id="notes"></textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save Visit</button>
</form>
{% endblock %}
