{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <h2>{{ 'Edit Patient' if edit else 'Add New Patient' }}</h2>
  <form method="post">
    <div class="mb-3">
      <label>First Name</label>
      <input type="text" name="first_name" class="form-control" value="{{ patient.first_name if patient else '' }}">
    </div>
    <div class="mb-3">
      <label>Last Name</label>
      <input type="text" name="last_name" class="form-control" value="{{ patient.last_name if patient else '' }}">
    </div>
    <div class="mb-3">
      <label>Date of Birth</label>
      <input type="date" name="dob" class="form-control" value="{{ patient.dob.strftime('%Y-%m-%d') if patient and patient.dob else '' }}">
    </div>
    <div class="mb-3">
      <label>Phone</label>
      <input type="text" name="phone" class="form-control" value="{{ patient.phone if patient else '' }}">
    </div>
    <div class="mb-3">
      <label>Email</label>
      <input type="email" name="email" class="form-control" value="{{ patient.email if patient else '' }}">
    </div>
    <div class="mb-3">
      <label>Address</label>
      <input type="text" name="address" class="form-control" value="{{ patient.address if patient else '' }}">
    </div>
    <div class="mb-3">
      <label>Insurance</label>
      <select name="insurance_id" class="form-control">
        <option value="">-- Select --</option>
        {% for ins in insurances %}
        <option value="{{ ins.id }}" {% if patient and patient.insurance_id == ins.id %}selected{% endif %}>
          {{ ins.company_name }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label>Physician</label>
      <select name="physician_id" class="form-control">
        <option value="">-- Select --</option>
        {% for doc in physicians %}
        <option value="{{ doc.id }}" {% if patient and patient.physician_id == doc.id %}selected{% endif %}>
          Dr. {{ doc.first_name }} {{ doc.last_name }}
        </option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-success">{{ 'Update' if edit else 'Add Patient' }}</button>
    <a href="{{ url_for('patients_list') }}" class="btn btn-secondary ms-2">Cancel</a>
  </form>

  {% if edit and patient and patient.id %}
  <div class="card mt-5 border-danger">
    <div class="card-header bg-danger text-white">
      ⚠️ Delete Patient
    </div>
    <div class="card-body">
      <p>This will permanently delete the patient and associated records.</p>
      <form method="POST" action="{{ url_for('delete_patient', patient_id=patient.id) }}">
        <button type="submit" class="btn btn-danger"
                onclick="return confirm('Are you sure you want to delete this patient? This cannot be undone.')">
          Delete Patient
        </button>
      </form>
    </div>
  </div>
  {% endif %}
</div>
{% endblock %}
