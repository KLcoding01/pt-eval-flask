{% extends "base.html" %}
{% block title %}Add New Patient - Clinic Scheduler{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar (same as above) -->
    <div class="col-md-3 col-lg-2 mb-4">
      <div class="list-group shadow rounded-4">
        <a href="{{ url_for('new_patient') }}" class="list-group-item list-group-item-action active">+ Add New Patient</a>
        <a href="{{ url_for('dashboard') }}" class="list-group-item list-group-item-action">🏠 Dashboard</a>
        <a href="{{ url_for('calendar') }}" class="list-group-item list-group-item-action">📅 Calendar</a>
        <a href="{{ url_for('uploads') }}" class="list-group-item list-group-item-action">📤 Uploads</a>
      </div>
    </div>

    <!-- Main content -->
    <div class="col-md-9 col-lg-10">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Add New Patient</h2>
      </div>
      <div class="card shadow-sm rounded-4 mb-5">
        <div class="card-body">
          <form method="POST">
            <div class="mb-3">
              <label for="first_name" class="form-label">First Name</label>
              <input type="text" class="form-control" id="first_name" name="first_name" required>
            </div>
            <div class="mb-3">
              <label for="last_name" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="last_name" name="last_name" required>
            </div>
            <div class="mb-3">
              <label for="dob" class="form-label">Date of Birth</label>
              <input type="date" class="form-control" id="dob" name="dob">
            </div>
            <div class="mb-3">
              <label for="phone" class="form-label">Phone</label>
              <input type="text" class="form-control" id="phone" name="phone">
            </div>
            <div class="mb-3">
              <label for="address" class="form-label">Address</label>
              <input type="text" class="form-control" id="address" name="address">
            </div>
            <button type="submit" class="btn btn-primary">Save Patient</button>
            <a href="{{ url_for('patients_list') }}" class="btn btn-secondary">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
