{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>{{ therapist and 'Edit Therapist' or 'Add Therapist' }}</h2>
    <form method="post">
        <div class="mb-3">
            <label for="first_name">First Name:</label>
            <input type="text" name="first_name" id="first_name" class="form-control"
                value="{{ therapist.first_name if therapist else '' }}" required>
        </div>
        <div class="mb-3">
            <label for="last_name">Last Name:</label>
            <input type="text" name="last_name" id="last_name" class="form-control"
                value="{{ therapist.last_name if therapist else '' }}" required>
        </div>
        <div class="mb-3">
            <label for="credentials">Credentials:</label>
            <input type="text" name="credentials" id="credentials" class="form-control"
                value="{{ therapist.credentials if therapist else '' }}">
        </div>
        <div class="mb-3">
            <label for="phone">Phone:</label>
            <input type="text" name="phone" id="phone" class="form-control"
                value="{{ therapist.phone if therapist else '' }}">
        </div>
        <div class="mb-3">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" class="form-control"
                value="{{ therapist.email if therapist else '' }}">
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a href="{{ url_for('therapists_list') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
