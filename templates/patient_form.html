{% extends "base.html" %}
{% block title %}
  {% if patient %}Edit Patient{% else %}Add Patient{% endif %}
{% endblock %}
{% block content %}
<h1>{% if patient %}Edit Patient{% else %}Add Patient{% endif %}</h1>

<form method="POST" action="">
  <div class="mb-3">
    <label for="first_name" class="form-label">First Name *</label>
    <input type="text" class="form-control" id="first_name" name="first_name" required value="{{ patient.first_name if patient else '' }}">
  </div>

  <div class="mb-3">
    <label for="last_name" class="form-label">Last Name *</label>
    <input type="text" class="form-control" id="last_name" name="last_name" required value="{{ patient.last_name if patient else '' }}">
  </div>

  <div class="mb-3">
    <label for="dob" class="form-label">Date of Birth</label>
    <input type="date" class="form-control" id="dob" name="dob" value="{{ patient.dob.strftime('%Y-%m-%d') if patient and patient.dob else '' }}">
  </div>

  <div class="mb-3">
    <label for="phone" class="form-label">Phone</label>
    <input type="tel" class="form-control" id="phone" name="phone" value="{{ patient.phone if patient else '' }}">
  </div>

  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" name="email" value="{{ patient.email if patient else '' }}">
  </div>

  <div class="mb-3">
    <label for="address" class="form-label">Address</label>
    <textarea class="form-control" id="address" name="address" rows="2">{{ patient.address if patient else '' }}</textarea>
  </div>

  <div class="mb-3">
    <label for="insurance_id" class="form-label">Insurance</label>
    <select class="form-select" id="insurance_id" name="insurance_id">
      <option value="">-- Select Insurance --</option>
      {% for ins in insurances %}
      <option value="{{ ins.id }}" {% if patient and patient.insurance_id == ins.id %}selected{% endif %}>{{ ins.company_name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label for="physician_id" class="form-label">Physician</label>
    <select class="form-select" id="physician_id" name="physician_id">
      <option value="">-- Select Physician --</option>
      {% for phy in physicians %}
      <option value="{{ phy.id }}" {% if patient and patient.physician_id == phy.id %}selected{% endif %}>Dr. {{ phy.first_name }} {{ phy.last_name }}</option>
      {% endfor %}
    </select>
  </div>

  <button type="submit" class="btn btn-primary">{% if patient %}Update{% else %}Add{% endif %} Patient</button>
  <a href="{{ url_for('patients_list') }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
