{% extends 'base.html' %}
{% block content %}
<h2>Add New Patient</h2>
<form method="POST">
  <input name="first_name" placeholder="First Name" class="form-control mb-2" required>
  <input name="last_name" placeholder="Last Name" class="form-control mb-2" required>
  <input name="dob" type="date" class="form-control mb-2">
  <select name="gender" class="form-control mb-2">
    <option>Male</option><option>Female</option><option>Other</option>
  </select>
  <input name="address" placeholder="Address" class="form-control mb-2">
  <input name="phone" placeholder="Phone" class="form-control mb-2">
  <input name="email" placeholder="Email" class="form-control mb-2">
  <textarea name="notes" placeholder="Notes" class="form-control mb-2"></textarea>
  <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
