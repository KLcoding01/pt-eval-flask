<!DOCTYPE html>
<html>
<head>
    <title>PT Eval Builder</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        body { background: #f4f4f4; }
        .container { max-width: 950px; margin: 30px auto; background: #f7f7f7; padding: 25px; border-radius: 10px; }
        .tab-pane { padding: 18px 0; }
        .tab-content { background: #ededed; border-radius: 9px; }
    </style>
</head>
<body>
    <div class="container">
        <h3 class="mb-3">PT Eval Builder</h3>
        <form method="POST">
            <div class="d-flex align-items-center mb-3">
                <label for="template" class="me-2 fw-bold">Template:</label>
                <select name="template" class="form-select w-auto me-2" style="min-width:240px;">
                    {% for t in templates %}
                        <option value="{{t}}" {% if t==selected_template %}selected{% endif %}>{{t}}</option>
                    {% endfor %}
                </select>
                <button class="btn btn-outline-primary btn-sm me-2" name="action" value="Load">Load</button>
                <button type="submit" class="btn btn-success btn-sm">Save/Preview</button>
                {% if result %}<span class="ms-3 text-success">{{ result }}</span>{% endif %}
            </div>
            <ul class="nav nav-tabs" id="evalTabs" role="tablist">
                {% for tab in ["Patient Info", "History", "Pain", "Objective", "Diff Dx", "Assessment Summary", "Plan"] %}
                    <li class="nav-item" role="presentation">
                        <button class="nav-link {% if loop.first %}active{% endif %}" id="tab-{{loop.index}}" data-bs-toggle="tab"
                                data-bs-target="#pane-{{loop.index}}" type="button" role="tab">{{tab}}</button>
                    </li>
                {% endfor %}
            </ul>
            <div class="tab-content mt-2">
                <!-- Patient Info -->
                <div class="tab-pane fade show active" id="pane-1" role="tabpanel">
                    <div class="row mb-2">
                        <div class="col-md-4"><label>Patient Name:</label>
                            <input type="text" class="form-control" name="name" value="{{ fields.get('name','') }}">
                        </div>
                        <div class="col-md-4"><label>Gender:</label>
                            <select class="form-select" name="gender">
                                <option value="Female" {% if fields.get('gender','')=='Female' %}selected{% endif %}>Female</option>
                                <option value="Male" {% if fields.get('gender','')=='Male' %}selected{% endif %}>Male</option>
                            </select>
                        </div>
                        <div class="col-md-4"><label>DOB (MM/DD/YYYY):</label>
                            <input type="text" class="form-control" name="dob" value="{{ fields.get('dob','') }}">
                        </div>
                    </div>
                    <div class="row mb-2">
                        <div class="col-md-4"><label>Age:</label>
                            <input type="text" class="form-control" name="age" value="{{ fields.get('age','') }}">
                        </div>
                        <div class="col-md-4"><label>Current Date:</label>
                            <input type="text" class="form-control" name="today" value="{{ fields.get('today','') }}">
                        </div>
                    </div>
                </div>
                <!-- History -->
                <div class="tab-pane fade" id="pane-2" role="tabpanel">
                    <textarea class="form-control mb-2" name="med_diag" rows="2" placeholder="Medical Diagnosis">{{ fields.get('med_diag','') }}</textarea>
                    <textarea class="form-control mb-2" name="med_hist" rows="2" placeholder="Medical History/HNP">{{ fields.get('med_hist','') }}</textarea>
                    <textarea class="form-control mb-2" name="subj" rows="3" placeholder="Subjective">{{ fields.get('subj','') }}</textarea>
                    <textarea class="form-control mb-2" name="meds" rows="2" placeholder="Current Medications">{{ fields.get('meds','') }}</textarea>
                    <textarea class="form-control mb-2" name="tests" rows="2" placeholder="Diagnostic Tests">{{ fields.get('tests','') }}</textarea>
                    <textarea class="form-control mb-2" name="dme" rows="2" placeholder="DME/Assistive Device">{{ fields.get('dme','') }}</textarea>
                    <textarea class="form-control mb-2" name="plof" rows="2" placeholder="PLOF">{{ fields.get('plof','') }}</textarea>
                </div>
                <!-- Pain -->
                <div class="tab-pane fade" id="pane-3" role="tabpanel">
                    <div class="row">
                        <div class="col-md-4"><label>Area/Location:</label>
                            <input class="form-control" name="pain_area" value="{{ fields.get('pain_area','') }}">
                        </div>
                        <div class="col-md-4"><label>Onset/Exacerbation Date:</label>
                            <input class="form-control" name="pain_onset" value="{{ fields.get('pain_onset','') }}">
                        </div>
                        <div class="col-md-4"><label>Condition:</label>
                            <input class="form-control" name="pain_cond" value="{{ fields.get('pain_cond','') }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4"><label>Mechanism:</label>
                            <input class="form-control" name="pain_mech" value="{{ fields.get('pain_mech','') }}">
                        </div>
                        <div class="col-md-4"><label>Pain Rating (P/B/W):</label>
                            <input class="form-control" name="pain_rating" value="{{ fields.get('pain_rating','') }}">
                        </div>
                        <div class="col-md-4"><label>Frequency:</label>
                            <input class="form-control" name="pain_freq" value="{{ fields.get('pain_freq','') }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4"><label>Description:</label>
                            <input class="form-control" name="pain_desc" value="{{ fields.get('pain_desc','') }}">
                        </div>
                        <div class="col-md-4"><label>Aggravating:</label>
                            <input class="form-control" name="pain_aggrav" value="{{ fields.get('pain_aggrav','') }}">
                        </div>
                        <div class="col-md-4"><label>Relieved By:</label>
                            <input class="form-control" name="pain_relieve" value="{{ fields.get('pain_relieve','') }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6"><label>Interferes With:</label>
                            <input class="form-control" name="pain_interfere" value="{{ fields.get('pain_interfere','') }}">
                        </div>
                    </div>
                </div>
                <!-- Objective -->
                <div class="tab-pane fade" id="pane-4" role="tabpanel">
                    <textarea class="form-control mb-2" name="posture" rows="2" placeholder="Posture">{{ fields.get('posture','') }}</textarea>
                    <textarea class="form-control mb-2" name="rom" rows="2" placeholder="ROM">{{ fields.get('rom','') }}</textarea>
                    <textarea class="form-control mb-2" name="str" rows="2" placeholder="Muscle Strength">{{ fields.get('str','') }}</textarea>
                    <textarea class="form-control mb-2" name="palpation" rows="2" placeholder="Palpation">{{ fields.get('palpation','') }}</textarea>
                    <textarea class="form-control mb-2" name="func" rows="2" placeholder="Functional Test(s)">{{ fields.get('func','') }}</textarea>
                    <textarea class="form-control mb-2" name="special" rows="2" placeholder="Special Test(s)">{{ fields.get('special','') }}</textarea>
                    <textarea class="form-control mb-2" name="impair" rows="2" placeholder="Current Functional Mobility Impairment(s)">{{ fields.get('impair','') }}</textarea>
                </div>
                <!-- Diff Dx -->
                <div class="tab-pane fade" id="pane-5" role="tabpanel">
                    <textarea class="form-control mb-2" name="diff" rows="3" placeholder="Best-Fit Diagnosis">{{ fields.get('diff','') }}</textarea>
                </div>
                <!-- Assessment Summary -->
                <div class="tab-pane fade" id="pane-6" role="tabpanel">
                    <div class="d-flex mb-2 align-items-center">
                        <label class="me-2">Assessment Summary:</label>
                        <button type="button" class="btn btn-outline-success btn-sm" onclick="generateSummary()">AI Generate</button>
                        <span id="summary-loader" class="ms-2" style="display:none;">Generating...</span>
                    </div>
                    <textarea name="summary" id="summary-box" class="form-control mb-2" rows="8">{{ fields.get('summary','') }}</textarea>
                </div>
                <!-- Plan -->
                <div class="tab-pane fade" id="pane-7" role="tabpanel">
                    <textarea class="form-control mb-2" name="goals" rows="4" placeholder="Goals">{{ fields.get('goals','') }}</textarea>
                    <textarea class="form-control mb-2" name="freq" rows="2" placeholder="Frequency/Duration">{{ fields.get('freq','') }}</textarea>
                    <textarea class="form-control mb-2" name="interv" rows="2" placeholder="Intervention">{{ fields.get('interv','') }}</textarea>
                    <textarea class="form-control mb-2" name="proc" rows="2" placeholder="Treatment Procedures">{{ fields.get('proc','') }}</textarea>
                    <button class="btn btn-primary mt-2" type="submit">Save/Preview</button>
                    <button class="btn btn-outline-secondary mt-2 ms-2" onclick="downloadWord(event)">Download as Word</button>
                </div>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function generateSummary() {
        let subj = document.querySelector('[name="subj"]').value;
        let dx = document.querySelector('[name="diff"]').value;
        let impair = document.querySelector('[name="impair"]').value;
        let func = document.querySelector('[name="func"]').value;
        let summaryBox = document.getElementById('summary-box');
        let loader = document.getElementById('summary-loader');
        loader.style.display = 'inline';

        fetch('/generate_summary', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ subj, diff: dx, impair, func })
        })
        .then(r => r.text())
        .then(text => { summaryBox.value = text; loader.style.display = 'none'; })
        .catch(_ => { loader.style.display = 'none'; alert('Error calling OpenAI.'); });
    }
    function downloadWord(e) {
        e.preventDefault();
        const form = e.target.closest('form');
        const fd = new FormData(form);
        fetch('/download_word', { method: 'POST', body: fd })
        .then(resp => resp.blob())
        .then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "PT_Eval.docx";
            document.body.appendChild(a);
            a.click();
            a.remove();
        });
    }
    </script>
</body>
</html>
