<!DOCTYPE html>
<html>
<head>
    <title>PT Eval Builder</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f4f4; }
        .container { max-width: 950px; margin: 30px auto; background: #f7f7f7; padding: 25px; border-radius: 10px; }
        .tab-pane { padding: 18px 0; }
        .form-label { font-weight: 500; }
        .row.align-items-center { margin-bottom: 16px; }
        .tab-content { background: #ededed; border-radius: 9px; }
        .topbar { margin-bottom: 20px; }
        .topbar select, .topbar button { margin-right: 7px; }
    </style>
</head>
<body>
<div class="container">
    <form method="post">
        <!-- Top bar with template dropdown and buttons -->
        <div class="d-flex align-items-center topbar">
            <label for="template" class="form-label mb-0 me-2">Template:</label>
            <select name="template" id="template" class="form-select w-auto me-2" style="min-width: 220px;">
                <option value="LBP Eval Template">LBP Eval Template</option>
                <!-- Add more options here -->
            </select>
            <button type="button" class="btn btn-outline-secondary btn-sm me-2">Load</button>
            <button type="button" class="btn btn-outline-secondary btn-sm me-2">Load Template (.docx)</button>
            <button type="button" class="btn btn-outline-secondary btn-sm">Save As Template</button>
        </div>

        <!-- Tab navigation -->
        <ul class="nav nav-tabs" id="evalTabs" role="tablist">
            <li class="nav-item" role="presentation"><button class="nav-link active" id="info-tab" data-bs-toggle="tab" data-bs-target="#info" type="button" role="tab">Patient Info</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history" type="button" role="tab">History</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="pain-tab" data-bs-toggle="tab" data-bs-target="#pain" type="button" role="tab">Pain</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="objective-tab" data-bs-toggle="tab" data-bs-target="#objective" type="button" role="tab">Objective</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="diff-tab" data-bs-toggle="tab" data-bs-target="#diff" type="button" role="tab">Diff Dx</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="summary-tab" data-bs-toggle="tab" data-bs-target="#summary" type="button" role="tab">Assessment Summary</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="plan-tab" data-bs-toggle="tab" data-bs-target="#plan" type="button" role="tab">Plan</button></li>
        </ul>

        <!-- Tab panes -->
        <div class="tab-content mt-3">
            <!-- Patient Info Tab -->
            <div class="tab-pane fade show active" id="info" role="tabpanel">
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <label class="form-label">Patient Name:</label>
                        <input type="text" class="form-control" name="name">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Gender:</label>
                        <select name="gender" class="form-select">
                            <option>Female</option>
                            <option>Male</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">DOB (MM/DD/YYYY):</label>
                        <input type="text" class="form-control" name="dob">
                    </div>
                </div>
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <label class="form-label">Age:</label>
                        <input type="text" class="form-control" name="age" readonly>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Current Date:</label>
                        <input type="text" class="form-control" name="current_date" value="{{current_date or ''}}" readonly>
                    </div>
                </div>
            </div>
            <!-- History Tab -->
            <div class="tab-pane fade" id="history" role="tabpanel">
                <label class="form-label">Medical Diagnosis:</label>
                <input type="text" class="form-control mb-2" name="medical_diagnosis">
                <label class="form-label">Medical History/HNP:</label>
                <textarea class="form-control mb-2" name="medical_history"></textarea>
                <label class="form-label">Subjective (HPI):</label>
                <textarea class="form-control mb-2" name="subjective"></textarea>
                <label class="form-label">Current Medications:</label>
                <textarea class="form-control mb-2" name="medications"></textarea>
            </div>
            <!-- Pain Tab -->
            <div class="tab-pane fade" id="pain" role="tabpanel">
                <label class="form-label">Area/Location of Injury:</label>
                <input type="text" class="form-control mb-2" name="injury_location">
                <label class="form-label">Onset/Exacerbation Date:</label>
                <input type="text" class="form-control mb-2" name="onset_date">
                <label class="form-label">Pain Rating (P/B/W):</label>
                <input type="text" class="form-control mb-2" name="pain_rating">
                <label class="form-label">Aggravating Factor:</label>
                <input type="text" class="form-control mb-2" name="aggravating_factor">
                <label class="form-label">Relieved By:</label>
                <input type="text" class="form-control mb-2" name="relieved_by">
                <!-- Add more fields as needed -->
            </div>
            <!-- Objective Tab -->
            <div class="tab-pane fade" id="objective" role="tabpanel">
                <label class="form-label">Posture:</label>
                <input type="text" class="form-control mb-2" name="posture">
                <label class="form-label">ROM:</label>
                <input type="text" class="form-control mb-2" name="rom">
                <label class="form-label">Strength:</label>
                <input type="text" class="form-control mb-2" name="strength">
                <!-- Add more fields as needed -->
            </div>
            <!-- Diff Dx Tab -->
            <div class="tab-pane fade" id="diff" role="tabpanel">
                <label class="form-label">Best-Fit Diagnosis:</label>
                <textarea class="form-control" name="diff_dx"></textarea>
            </div>
            <!-- Assessment Summary Tab -->
            <div class="tab-pane fade" id="summary" role="tabpanel">
                <label class="form-label">Assessment Summary:</label>
                <textarea class="form-control" name="assessment_summary"></textarea>
            </div>
            <!-- Plan Tab -->
            <div class="tab-pane fade" id="plan" role="tabpanel">
                <label class="form-label">Goals:</label>
                <textarea class="form-control mb-2" name="goals"></textarea>
                <label class="form-label">Frequency/Duration:</label>
                <input type="text" class="form-control mb-2" name="frequency">
                <label class="form-label">Intervention:</label>
                <textarea class="form-control mb-2" name="intervention"></textarea>
                <label class="form-label">Treatment Procedures:</label>
                <textarea class="form-control mb-2" name="procedures"></textarea>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Save/Preview</button>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
