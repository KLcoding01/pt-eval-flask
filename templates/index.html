<!DOCTYPE html>
<html>
<head>
  <title>Test DiffDx Only</title>
</head>
<body>
  <button id="ai-generate-diffdx">AI Generate</button>
  <textarea id="diffdx" rows="10" style="width:100%"></textarea>
  <script>
    document.getElementById('ai-generate-diffdx').onclick = function() {
      fetch('/generate_diffdx', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({fields: {subjective:"test"}})
      })
      .then(r => r.text())
      .then(t => {
        console.log("DIFFDX RAW:", t);
        document.getElementById('diffdx').value = t.replace(/\\n/g, '\n');
      });
    };
  </script>
</body>
</html>
