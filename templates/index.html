<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PT Eval Note Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background-color: #f9f9f9;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      resize: vertical;
    }
    input[type="submit"] {
      display: block;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-top: 15px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    input[type="submit"]:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>PT Eval Note Generator</h1>
  <form method="POST" action="/generate">
    <label for="prompt">Enter your clinical prompt:</label><br><br>
    <textarea name="prompt" rows="8" placeholder="e.g. Generate a SOAP assessment summary for a patient with LBP and limited flexion."></textarea><br>
    <input type="submit" value="Generate Note">
  </form>
</body>
</html>
