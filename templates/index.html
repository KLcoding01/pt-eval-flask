<!DOCTYPE html>
<html>
<head>
    <title>PT Eval Builder</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        body { background: #f4f4f4; }
        .container { max-width: 980px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 12px; }
        .tab-content { margin-top: 18px; }
        .form-label { font-weight: 500; }
        .ai-btn { margin-left: 6px; }
        .ai-btn, .btn { min-width: 100px; }
    </style>
</head>
<body>
<div class="container">
    <h2 class="mb-3">PT Eval Builder</h2>
    <form id="ptevalform">
        <div class="d-flex align-items-center mb-3">
            <label class="me-2 fw-bold">Template:</label>
            <select name="template" class="form-select w-auto me-2" id="template-select">
                <option value="LBP Eval Template">LBP Eval Template</option>
            </select>
            <button type="button" class="btn btn-outline-primary btn-sm me-2" id="load-template-btn">Load</button>
            <button type="submit" class="btn btn-success btn-sm">Save/Preview</button>
            <span id="status-msg" class="ms-3"></span>
        </div>
        <ul class="nav nav-tabs" id="evalTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#patientinfo" type="button" role="tab">Patient Info</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#history" type="button" role="tab">History</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pain" type="button" role="tab">Pain</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#objective" type="button" role="tab">Objective</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#diffdx" type="button" role="tab">Diff Dx</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#summary" type="button" role="tab">Assessment Summary</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#plan" type="button" role="tab">Plan</button></li>
        </ul>
        <div class="tab-content p-3 bg-light border-bottom border-end border-start">
            <!-- Patient Info Tab -->
            <div class="tab-pane fade show active" id="patientinfo" role="tabpanel">
                <div class="row mb-2">
                    <div class="col-md-3"><label class="form-label">Patient Name:</label><input type="text" class="form-control" name="name" id="name"></div>
                    <div class="col-md-3"><label class="form-label">Gender:</label>
                        <select class="form-select" name="gender" id="gender">
                            <option>Female</option><option>Male</option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="form-label">DOB (MM/DD/YYYY):</label><input type="text" class="form-control" name="dob" id="dob"></div>
                    <div class="col-md-3"><label class="form-label">Age:</label><input type="text" class="form-control" name="age" id="age"></div>
                </div>
                <div class="row">
                    <div class="col-md-4"><label class="form-label">Current Date:</label><input type="text" class="form-control" name="currentdate" id="currentdate" value=""></div>
                </div>
            </div>
            <!-- History Tab -->
            <div class="tab-pane fade" id="history" role="tabpanel">
                <div class="mb-2"><label class="form-label">Medical Diagnosis:</label>
                    <textarea class="form-control" rows="2" name="meddiag" id="meddiag"></textarea></div>
                <div class="mb-2"><label class="form-label">Medical History/HNP:</label>
                    <textarea class="form-control" rows="2" name="history" id="history-field"></textarea></div>
                <div class="mb-2"><label class="form-label">Subjective (HPI):</label>
                    <textarea class="form-control" rows="3" name="subjective" id="subjective"></textarea></div>
                <div class="mb-2"><label class="form-label">Current Medication(s):</label>
                    <textarea class="form-control" rows="2" name="meds" id="meds"></textarea></div>
                <div class="mb-2"><label class="form-label">Diagnostic Test(s):</label>
                    <textarea class="form-control" rows="2" name="tests" id="tests"></textarea></div>
                <div class="mb-2"><label class="form-label">DME/Assistive Device:</label>
                    <textarea class="form-control" rows="2" name="dme" id="dme"></textarea></div>
                <div class="mb-2"><label class="form-label">PLOF:</label>
                    <textarea class="form-control" rows="2" name="plof" id="plof"></textarea></div>
            </div>
            <!-- Pain Tab -->
            <div class="tab-pane fade" id="pain" role="tabpanel">
                <div class="row">
                    <div class="col-md-4"><label class="form-label">Area/Location of Injury</label><input class="form-control" name="pain_location" id="pain_location"></div>
                    <div class="col-md-4"><label class="form-label">Onset/Exacerbation Date</label><input class="form-control" name="pain_onset" id="pain_onset"></div>
                    <div class="col-md-4"><label class="form-label">Condition of Injury</label><input class="form-control" name="pain_condition" id="pain_condition"></div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-4"><label class="form-label">Mechanism of Injury</label><input class="form-control" name="pain_mechanism" id="pain_mechanism"></div>
                    <div class="col-md-4"><label class="form-label">Pain Rating (P/B/W)</label><input class="form-control" name="pain_rating" id="pain_rating"></div>
                    <div class="col-md-4"><label class="form-label">Pain Frequency</label><input class="form-control" name="pain_frequency" id="pain_frequency"></div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-4"><label class="form-label">Description</label><input class="form-control" name="pain_description" id="pain_description"></div>
                    <div class="col-md-4"><label class="form-label">Aggravating Factor</label><input class="form-control" name="pain_aggravating" id="pain_aggravating"></div>
                    <div class="col-md-4"><label class="form-label">Relieved By</label><input class="form-control" name="pain_relieved" id="pain_relieved"></div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-4"><label class="form-label">Interferes With</label><input class="form-control" name="pain_interferes" id="pain_interferes"></div>
                </div>
            </div>
            <!-- Objective Tab -->
            <div class="tab-pane fade" id="objective" role="tabpanel">
                <div class="mb-2"><label class="form-label">Posture:</label>
                    <textarea class="form-control" rows="2" name="posture" id="posture"></textarea></div>
                <div class="mb-2"><label class="form-label">ROM:</label>
                    <textarea class="form-control" rows="2" name="rom" id="rom"></textarea></div>
                <div class="mb-2"><label class="form-label">Muscle Strength Test:</label>
                    <textarea class="form-control" rows="2" name="strength" id="strength"></textarea></div>
                <div class="mb-2"><label class="form-label">Palpation:</label>
                    <textarea class="form-control" rows="2" name="palpation" id="palpation"></textarea></div>
                <div class="mb-2"><label class="form-label">Functional Test(s):</label>
                    <textarea class="form-control" rows="2" name="functional" id="functional"></textarea></div>
                <div class="mb-2"><label class="form-label">Special Test(s):</label>
                    <textarea class="form-control" rows="2" name="special" id="special"></textarea></div>
                <div class="mb-2"><label class="form-label">Current Functional Mobility Impairment(s):</label>
                    <textarea class="form-control" rows="2" name="impairments" id="impairments"></textarea></div>
            </div>
            <!-- Diff Dx Tab -->
            <div class="tab-pane fade" id="diffdx" role="tabpanel">
                <div class="mb-2 d-flex align-items-center">
                    <label class="form-label mb-0 me-2">Best-Fit Diagnosis</label>
                    <button type="button" class="btn btn-outline-success btn-sm ai-btn" id="ai-generate-diffdx">AI Generate</button>
                </div>
                <textarea class="form-control" rows="2" name="diffdx" id="diffdx"></textarea>
            </div>
            <!-- Assessment Summary Tab -->
            <div class="tab-pane fade" id="summary" role="tabpanel">
                <div class="mb-2 d-flex align-items-center">
                    <label class="form-label mb-0 me-2">Assessment Summary:</label>
                    <button type="button" class="btn btn-outline-success btn-sm ai-btn" id="ai-generate-summary">AI Generate</button>
                </div>
                <textarea class="form-control" rows="4" name="summary" id="summary-text"></textarea>
            </div>
            <!-- Plan Tab -->
            <div class="tab-pane fade" id="plan" role="tabpanel">
                <div class="mb-2 d-flex align-items-center">
                    <label class="form-label mb-0 me-2">Goals:</label>
                    <button type="button" class="btn btn-outline-success btn-sm ai-btn" id="ai-generate-goals">AI Generate</button>
                </div>
                <textarea class="form-control" rows="6" name="goals" id="goals-text"></textarea>
                <div class="mb-2 mt-3"><label class="form-label">Frequency/Duration:</label>
                    <input class="form-control" name="frequency" id="frequency"></div>
                <div class="mb-2"><label class="form-label">Intervention:</label>
                    <textarea class="form-control" rows="2" name="intervention" id="intervention"></textarea></div>
                <div class="mb-2"><label class="form-label">Treatment Procedures:</label>
                    <textarea class="form-control" rows="2" name="procedures" id="procedures"></textarea></div>
            </div>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function getAllFields() {
    const data = {};
    document.querySelectorAll('input, textarea, select').forEach(el => {
        if (el.name) data[el.name] = el.value;
    });
    return data;
}
function setStatus(msg, color="green") {
    document.getElementById('status-msg').textContent = msg;
    document.getElementById('status-msg').style.color = color;
}
// AI Generate Diff Dx
document.getElementById('ai-generate-diffdx').onclick = function() {
    setStatus("Generating Diff Dx...", "orange");
    fetch('/generate_diffdx', {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({fields: getAllFields()})
    })
    .then(r => r.text())
    .then(t => {
        document.getElementById('diffdx').value = t;
        setStatus("Diff Dx generated!", "green");
    }).catch(e => setStatus("AI error", "red"));
};
// AI Generate Assessment Summary
document.getElementById('ai-generate-summary').onclick = function() {
    setStatus("Generating summary...", "orange");
    fetch('/generate_summary', {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({fields: getAllFields()})
    })
    .then(r => r.text())
    .then(t => {
        document.getElementById('summary-text').value = t;
        setStatus("Assessment summary generated!", "green");
    }).catch(e => setStatus("AI error", "red"));
};
// AI Generate Goals
document.getElementById('ai-generate-goals').onclick = function() {
    setStatus("Generating goals...", "orange");
    fetch('/generate_goals', {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({fields: getAllFields()})
    })
    .then(r => r.text())
    .then(t => {
        document.getElementById('goals-text').value = t;
        setStatus("Goals generated!", "green");
    }).catch(e => setStatus("AI error", "red"));
};
// Template loader
document.getElementById('load-template-btn').onclick = function() {
    const tmpl = document.getElementById('template-select').value;
    fetch('/load_template', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({template: tmpl})
    })
    .then(resp => resp.json())
    .then(data => {
        for (const [k, v] of Object.entries(data)) {
            let fld = document.getElementById(k) || document.querySelector(`[name='${k}']`);
            if (fld) fld.value = v || "";
        }
    });
};
</script>
</body>
</html>
