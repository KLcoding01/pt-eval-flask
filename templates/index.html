<!DOCTYPE html>
<html>
<head>
  <title>PT Eval Builder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f4f4; }
    .container { max-width: 980px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 12px; }
    .ai-btn, .btn { min-width: 100px; margin-left: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>PT Eval Builder</h2>
    <div class="d-flex align-items-center mb-3">
      <label class="fw-bold me-2">Template:</label>
      <select id="template-select" class="form-select w-auto me-2">
        {% for t in templates %}
          <option>{{ t }}</option>
        {% endfor %}
      </select>
      <button id="load-template-btn" class="btn btn-outline-primary btn-sm">Load</button>
      <button id="save-word-btn" class="btn btn-info btn-sm">Export Word</button>
      <button id="save-pdf-btn" class="btn btn-danger btn-sm">Export PDF</button>
      <span id="status-msg" class="ms-3"></span>
    </div>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item"><a class="nav-link active" href="#patientinfo" data-bs-toggle="tab">Patient Info</a></li>
      <li class="nav-item"><a class="nav-link" href="#history" data-bs-toggle="tab">History</a></li>
      <li class="nav-item"><a class="nav-link" href="#pain" data-bs-toggle="tab">Pain</a></li>
      <li class="nav-item"><a class="nav-link" href="#objective" data-bs-toggle="tab">Objective</a></li>
      <li class="nav-item"><a class="nav-link" href="#diffdx" data-bs-toggle="tab">Diff Dx</a></li>
      <li class="nav-item"><a class="nav-link" href="#summary" data-bs-toggle="tab">Assessment Summary</a></li>
      <li class="nav-item"><a class="nav-link" href="#plan" data-bs-toggle="tab">Plan</a></li>
    </ul>

    <form id="ptevalform">
      <div class="tab-content">
        <!-- Patient Info -->
        <div class="tab-pane fade show active" id="patientinfo">
          <div class="row mb-2">
            <div class="col"><input name="name" id="name" class="form-control" placeholder="Patient Name"></div>
            <div class="col">
              <select name="gender" id="gender" class="form-select">
                <option>Female</option><option>Male</option>
              </select>
            </div>
            <div class="col"><input name="dob" id="dob" class="form-control" placeholder="DOB (MM/DD/YYYY)"></div>
            <div class="col"><input name="age" id="age" class="form-control" placeholder="Age"></div>
          </div>
          <div class="row">
            <div class="col"><input name="currentdate" id="currentdate" class="form-control" placeholder="Current Date"></div>
          </div>
        </div>

        <!-- History -->
        <div class="tab-pane fade" id="history">
          <textarea name="meddiag" id="meddiag" class="form-control mb-2" placeholder="Medical Diagnosis"></textarea>
          <textarea name="history" id="history" class="form-control mb-2" placeholder="Medical History/HNP"></textarea>
          <textarea name="subjective" id="subjective" class="form-control mb-2" placeholder="Subjective (HPI)"></textarea>
          <textarea name="meds" id="meds" class="form-control mb-2" placeholder="Current Medication(s)"></textarea>
          <textarea name="tests" id="tests" class="form-control mb-2" placeholder="Diagnostic Test(s)"></textarea>
          <textarea name="dme" id="dme" class="form-control mb-2" placeholder="DME/Assistive Device"></textarea>
          <textarea name="plof" id="plof" class="form-control mb-2" placeholder="PLOF"></textarea>
        </div>

        <!-- Pain -->
        <div class="tab-pane fade" id="pain">
          <input name="pain_location" id="pain_location" class="form-control mb-2" placeholder="Area/Location of Injury">
          <input name="pain_onset"     id="pain_onset"     class="form-control mb-2" placeholder="Onset/Exacerbation Date">
          <input name="pain_condition" id="pain_condition" class="form-control mb-2" placeholder="Condition of Injury">
          <input name="pain_mechanism" id="pain_mechanism" class="form-control mb-2" placeholder="Mechanism of Injury">
          <input name="pain_rating"    id="pain_rating"    class="form-control mb-2" placeholder="Pain Rating (P/B/W)">
          <input name="pain_frequency" id="pain_frequency" class="form-control mb-2" placeholder="Pain Frequency">
          <input name="pain_description" id="pain_description" class="form-control mb-2" placeholder="Description">
          <input name="pain_aggravating" id="pain_aggravating" class="form-control mb-2" placeholder="Aggravating Factor">
          <input name="pain_relieved"    id="pain_relieved"    class="form-control mb-2" placeholder="Relieved By">
          <input name="pain_interferes"  id="pain_interferes"  class="form-control mb-2" placeholder="Interferes With">
        </div>

        <!-- Objective -->
        <div class="tab-pane fade" id="objective">
          <textarea name="posture"    id="posture"    class="form-control mb-2" placeholder="Posture"></textarea>
          <textarea name="rom"        id="rom"        class="form-control mb-2" placeholder="ROM"></textarea>
          <textarea name="strength"   id="strength"   class="form-control mb-2" placeholder="Muscle Strength Test"></textarea>
          <textarea name="palpation"  id="palpation"  class="form-control mb-2" placeholder="Palpation"></textarea>
          <textarea name="functional" id="functional" class="form-control mb-2" placeholder="Functional Test(s)"></textarea>
          <textarea name="special"    id="special"    class="form-control mb-2" placeholder="Special Test(s)"></textarea>
          <textarea name="impairments" id="impairments" class="form-control mb-2" placeholder="Current Functional Mobility Impairment(s)"></textarea>
        </div>

        <!-- Diff Dx -->
        <div class="tab-pane fade" id="diffdx">
          <button type="button" id="ai-generate-diffdx" class="btn btn-outline-success btn-sm mb-2">AI Generate</button>
          <textarea name="diffdx" id="diffdx-text" class="form-control" rows="2"></textarea>
        </div>

        <!-- Assessment Summary -->
        <div class="tab-pane fade" id="summary">
          <button type="button" id="ai-generate-summary" class="btn btn-outline-success btn-sm mb-2">AI Generate</button>
          <textarea name="summary" id="summary-text" class="form-control" rows="4"></textarea>
        </div>

        <!-- Plan -->
        <div class="tab-pane fade" id="plan">
          <button type="button" id="ai-generate-goals" class="btn btn-outline-success btn-sm mb-2">AI Generate Goals</button>
          <textarea name="goals" id="goals-text" class="form-control mb-2" rows="6"></textarea>
          <input name="frequency" id="frequency" class="form-control mb-2" placeholder="Frequency/Duration">
          <textarea name="intervention" id="intervention" class="form-control mb-2" placeholder="Intervention"></textarea>
          <textarea name="procedures"  id="procedures"  class="form-control mb-2" placeholder="Treatment Procedures"></textarea>
        </div>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function getAllFields() {
      const data = {};
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if (el.name) data[el.name] = el.value;
      });
      return data;
    }
    function setStatus(msg, color="green") {
      const s = document.getElementById('status-msg');
      s.textContent = msg; s.style.color = color;
    }

    // Load template
    document.getElementById('load-template-btn').onclick = () => {
      fetch('/load_template', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ template: document.getElementById('template-select').value })
      })
      .then(r=>r.json())
      .then(data=>{
        for (let k in data) {
          const fld = document.getElementById(k) || document.querySelector(`[name="${k}"]`);
          if (fld) fld.value = data[k];
        }
      });
    };
    document.getElementById('ai-generate-diffdx').onclick = () => {
       setStatus("Generating Diff Dx…","orange");
       fetch('/generate_diffdx', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ fields: getAllFields() })
    })
       .then(r => r.text())
       .then(t => {
        console.log("DIFFDX RAW:", t); // You should see your AI text here!
        document.getElementById('diffdx').value = t.replace(/\\n/g, '\n');
        setStatus("Diff Dx generated!","green");
       }).catch(()=> setStatus("AI error","red"));
    };
    document.getElementById('ai-generate-summary').onclick = () => {
      setStatus("Generating summary…","orange");
      fetch('/generate_summary', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ fields: getAllFields() })
      })
      .then(r=>r.text())
      .then(t=>{
        document.getElementById('summary-text').value = t;
        setStatus("Summary generated!","green");
      }).catch(()=> setStatus("AI error","red"));
    };

    document.getElementById('ai-generate-goals').onclick = () => {
      setStatus("Generating goals…","orange");
      fetch('/generate_goals', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ fields: getAllFields() })
      })
      .then(r=>r.text())
      .then(t=>{
        document.getElementById('goals-text').value = t;
        setStatus("Goals generated!","green");
      }).catch(()=> setStatus("AI error","red"));
    };

    // Export Word
    document.getElementById('save-word-btn').onclick = () => {
      setStatus("Exporting Word...","orange");
      fetch('/export_word', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(getAllFields())
      })
      .then(r=>r.blob())
      .then(blob=>{
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "PT_Eval.docx";
        document.body.appendChild(a);
        a.click();
        a.remove();
        setStatus("Word downloaded!","green");
      });
    };

    // Export PDF
    document.getElementById('save-pdf-btn').onclick = () => {
      setStatus("Exporting PDF...","orange");
      fetch('/export_pdf', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(getAllFields())
      })
      .then(r=>r.blob())
      .then(blob=>{
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "PT_Eval.pdf";
        document.body.appendChild(a);
        a.click();
        a.remove();
        setStatus("PDF downloaded!","green");
      });
    };
  </script>
</body>
</html>
