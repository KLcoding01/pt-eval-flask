<!DOCTYPE html>
<html>
<head>
  <title>GPTW - PT Note Builder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f4f4; }
    .container { max-width: 980px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 12px; }
    .main-tabs .nav-link { min-width: 180px; text-align: center; }
    .tab-content { margin-top: 24px; }
    .ai-btn, .btn { min-width: 100px; margin-left: 6px; }
    label { font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <h2>GPTW - PT Note Builder</h2>
    <ul class="nav nav-tabs main-tabs" id="mainTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="eval-tab" data-bs-toggle="tab" data-bs-target="#eval" type="button" role="tab">PT Eval Builder</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="daily-tab" data-bs-toggle="tab" data-bs-target="#daily" type="button" role="tab">Daily Note Builder</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="soap-tab" data-bs-toggle="tab" data-bs-target="#soap" type="button" role="tab">SOAP Note Generator</button>
      </li>
    </ul>
    <div class="tab-content" id="mainTabContent">

      <!-- PT Eval Builder tab -->
      <div class="tab-pane fade show active" id="eval" role="tabpanel" aria-labelledby="eval-tab">
        <form id="ptevalform">
          <div class="mb-3"><input name="name" id="eval-name" class="form-control" placeholder="Patient Name"></div>
          <div class="mb-3"><textarea name="meddiag" id="eval-meddiag" class="form-control" placeholder="Medical Diagnosis"></textarea></div>
          <div class="mb-3"><textarea name="history" id="eval-history" class="form-control" placeholder="History"></textarea></div>
          <div class="d-flex mb-2">
            <button type="button" id="ai-generate-summary" class="btn btn-outline-success btn-sm me-2">AI Generate Eval Summary</button>
            <button type="button" id="ai-regenerate-summary" class="btn btn-outline-warning btn-sm">Regenerate</button>
          </div>
          <textarea name="summary" id="summary-text" class="form-control" rows="4" placeholder="Eval summary will appear here..."></textarea>
          <span id="eval-status-msg"></span>
        </form>
      </div>

      <!-- SOAP Note Generator tab -->
      <div class="tab-pane fade" id="soap" role="tabpanel" aria-labelledby="soap-tab">
        <form id="soapform" autocomplete="off">
          <div class="mb-2">
            <label for="dx">Dx Summary</label>
            <input name="dx" id="dx" class="form-control mb-2" placeholder="E.g. LBP with tight QLs and lumbar paraspinals.">
            <label for="iv">Interventions</label>
            <input name="iv" id="iv" class="form-control mb-2" placeholder="E.g. STM to lumbar spine, TherEx for core, etc.">
            <label for="tol">Tolerance</label>
            <input name="tol" id="tol" class="form-control mb-2" placeholder="E.g. Tolerated well, mild discomfort during TherEx.">
            <label for="prog">Progress</label>
            <input name="prog" id="prog" class="form-control mb-2" placeholder="E.g. Improved trunk control and decreased pain.">
            <label for="plan">Plan</label>
            <input name="plan" id="plan" class="form-control mb-2" placeholder="E.g. Continue STM and core TherEx to address LBP.">
          </div>
          <div class="mb-2">
            <button type="button" id="ai-generate-soap" class="btn btn-outline-success btn-sm me-2">AI Generate SOAP Summary</button>
            <button type="button" id="ai-regenerate-soap" class="btn btn-outline-warning btn-sm">Regenerate</button>
          </div>
          <textarea name="soap-summary" id="soap-summary-text" class="form-control" rows="6" placeholder="Your AI-generated SOAP summary will appear here..."></textarea>
          <span id="soap-status-msg"></span>
        </form>
      </div>
    </div>
    <span id="status-msg" class="ms-3"></span>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // PT Eval
    function getEvalFields() {
      return {
        name: document.getElementById('eval-name').value,
        meddiag: document.getElementById('eval-meddiag').value,
        history: document.getElementById('eval-history').value
      };
    }
    function setEvalStatus(msg, color="green") {
      const s = document.getElementById('eval-status-msg');
      s.textContent = msg; s.style.color = color;
    }
    function generateEvalSummary() {
      setEvalStatus("Generating summary…", "orange");
      fetch('/generate_summary', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ fields: getEvalFields() })
      })
      .then(r=>r.text())
      .then(t=>{
        document.getElementById('summary-text').value = t;
        setEvalStatus("Summary generated!", "green");
      }).catch(()=> setEvalStatus("AI error", "red"));
    }
    document.getElementById('ai-generate-summary').onclick = generateEvalSummary;
    document.getElementById('ai-regenerate-summary').onclick = generateEvalSummary;

    // Daily Note
    function setDailyStatus(msg, color="green") {
      const s = document.getElementById('daily-status-msg');
      s.textContent = msg; s.style.color = color;
    }
    document.getElementById('dn-ai-generate').onclick = () => {
      setDailyStatus("Generating Daily Note…","orange");
      const fields = {
        name: document.getElementById('dn-name').value,
        date: document.getElementById('dn-date').value,
        subjective: document.getElementById('dn-subjective').value,
        objective: document.getElementById('dn-objective').value,
        assessment: document.getElementById('dn-assessment').value,
        plan: document.getElementById('dn-plan').value,
      };
      fetch('/generate_daily_note', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ fields: fields })
      })
      .then(r=>r.text())
      .then(t=>{
        document.getElementById('dn-output').value = t;
        setDailyStatus("Daily Note generated!","green");
      }).catch(()=> setDailyStatus("AI error","red"));
    };

    // SOAP Note Generator
    function getSoapFields() {
      return {
        dx:   document.getElementById('dx').value,
        iv:   document.getElementById('iv').value,
        tol:  document.getElementById('tol').value,
        prog: document.getElementById('prog').value,
        plan: document.getElementById('plan').value
      };
    }
    function setSoapStatus(msg, color="green") {
      const s = document.getElementById('soap-status-msg');
      s.textContent = msg; s.style.color = color;
    }
    function generateSoapSummary() {
      setSoapStatus("Generating summary…", "orange");
      fetch('/generate_soap_summary', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ fields: getSoapFields() })
      })
      .then(r=>r.text())
      .then(t=>{
        document.getElementById('soap-summary-text').value = t;
        setSoapStatus("Summary generated!", "green");
      }).catch(()=> setSoapStatus("AI error", "red"));
    }
    document.getElementById('ai-generate-soap').onclick = generateSoapSummary;
    document.getElementById('ai-regenerate-soap').onclick = generateSoapSummary;
  </script>
</body>
</html>
