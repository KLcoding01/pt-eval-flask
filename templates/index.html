<!DOCTYPE html>
<html lang="en">
<head>
    <title>PT Eval Builder</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        textarea, input { min-width:160px; }
        label { font-weight: 500; }
        .ai-btn { min-width: 130px; }
    </style>
</head>
<body class="container p-3">

    <h1 class="mb-3">PT Eval Builder</h1>
    <div class="mb-3 d-flex align-items-center">
        <select id="templateSelect" class="form-select w-auto me-2">
            {% for name in templates %}
                <option>{{name}}</option>
            {% endfor %}
        </select>
        <button id="loadBtn" class="btn btn-primary me-3">Load Template</button>
        <span id="status" class="text-success ms-3"></span>
    </div>
    <form id="eval-form" autocomplete="off">
        <div class="row">
            <div class="col-md-6">
                <label>Medical Diagnosis:</label>
                <textarea id="med_diag" class="form-control mb-2"></textarea>

                <label>Medical History/HNP:</label>
                <textarea id="med_hist" class="form-control mb-2"></textarea>

                <label>Subjective:</label>
                <textarea id="subj" class="form-control mb-2"></textarea>

                <label>Current Medication(s):</label>
                <textarea id="meds" class="form-control mb-2"></textarea>

                <label>Diagnostic Test(s):</label>
                <textarea id="tests" class="form-control mb-2"></textarea>

                <label>DME/Assistive Device:</label>
                <textarea id="dme" class="form-control mb-2"></textarea>

                <label>PLOF:</label>
                <textarea id="plof" class="form-control mb-2"></textarea>
            </div>
            <div class="col-md-6">
                <label>Posture:</label>
                <textarea id="posture" class="form-control mb-2"></textarea>

                <label>ROM:</label>
                <textarea id="rom" class="form-control mb-2"></textarea>

                <label>Muscle Strength Test:</label>
                <textarea id="str" class="form-control mb-2"></textarea>

                <label>Palpation:</label>
                <textarea id="palpation" class="form-control mb-2"></textarea>

                <label>Functional Test(s):</label>
                <textarea id="func" class="form-control mb-2"></textarea>

                <label>Special Test(s):</label>
                <textarea id="special" class="form-control mb-2"></textarea>

                <label>Current Functional Mobility Impairment(s):</label>
                <textarea id="impair" class="form-control mb-2"></textarea>
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-md-4">
                <label>Pain - Area/Location of Injury:</label>
                <input id="pain_area" class="form-control mb-2">
                <label>Pain - Onset/Exacerbation Date:</label>
                <input id="pain_onset" class="form-control mb-2">
                <label>Pain - Condition of Injury:</label>
                <input id="pain_cond" class="form-control mb-2">
                <label>Pain - Mechanism of Injury:</label>
                <input id="pain_mech" class="form-control mb-2">
            </div>
            <div class="col-md-4">
                <label>Pain - Rating (P/B/W):</label>
                <input id="pain_rating" class="form-control mb-2">
                <label>Pain - Frequency:</label>
                <input id="pain_freq" class="form-control mb-2">
                <label>Pain - Description:</label>
                <input id="pain_desc" class="form-control mb-2">
            </div>
            <div class="col-md-4">
                <label>Pain - Aggravating Factor:</label>
                <input id="pain_aggrav" class="form-control mb-2">
                <label>Pain - Relieved By:</label>
                <input id="pain_relieve" class="form-control mb-2">
                <label>Pain - Interferes With:</label>
                <input id="pain_interfere" class="form-control mb-2">
            </div>
        </div>
        <hr>
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label>Best-Fit Diagnosis (Diff Dx):</label>
                <textarea id="diffdx" class="form-control"></textarea>
                <button id="diffdxBtn" type="button" class="btn btn-secondary ai-btn mt-1">AI Generate Diff Dx</button>
            </div>
            <div class="col-md-4">
                <label>Assessment Summary:</label>
                <textarea id="summary" class="form-control"></textarea>
                <button id="summaryBtn" type="button" class="btn btn-secondary ai-btn mt-1">AI Generate Summary</button>
            </div>
            <div class="col-md-4">
                <label>Goals:</label>
                <textarea id="goals" class="form-control"></textarea>
                <button id="goalsBtn" type="button" class="btn btn-secondary ai-btn mt-1">AI Generate Goals</button>
            </div>
        </div>
    </form>

    <script>
    function getAllFields() {
        let ids = [
            'med_diag','med_hist','subj','meds','tests','dme','plof','posture','rom','str','palpation','func',
            'special','impair','goals','freq','interv','proc','pain_area','pain_onset','pain_cond','pain_mech',
            'pain_rating','pain_freq','pain_desc','pain_aggrav','pain_relieve','pain_interfere','diffdx','summary'
        ];
        let fields = {};
        ids.forEach(id=>{
            let el = document.getElementById(id);
            fields[id] = el ? el.value : "";
        });
        return fields;
    }
    function setStatus(msg, color) {
        let s = document.getElementById('status');
        s.innerText = msg; s.className = color === "green" ? "text-success" : "text-danger";
    }
    document.getElementById('loadBtn').onclick = function() {
        fetch("/load_template", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({template: document.getElementById('templateSelect').value})
        })
        .then(r=>r.json()).then(fields=>{
            for(const k in fields){
                if(document.getElementById(k)){
                    document.getElementById(k).value = fields[k];
                }
            }
            setStatus("Template loaded!", "green");
        }).catch(()=>setStatus("Load error", "red"));
    };
    document.getElementById('diffdxBtn').onclick = function() {
        setStatus("Generating Diff Dx...", "green");
        fetch("/generate_diffdx", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({fields:getAllFields()})
        }).then(r=>r.text()).then(t=>{
            document.getElementById('diffdx').value = t;
            setStatus("Diff Dx generated!", "green");
        }).catch(()=>setStatus("AI error", "red"));
    };
    document.getElementById('summaryBtn').onclick = function() {
        setStatus("Generating summary...", "green");
        fetch("/generate_summary", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({fields:getAllFields()})
        }).then(r=>r.text()).then(t=>{
            document.getElementById('summary').value = t;
            setStatus("Summary generated!", "green");
        }).catch(()=>setStatus("AI error", "red"));
    };
    document.getElementById('goalsBtn').onclick = function() {
        setStatus("Generating goals...", "green");
        fetch("/generate_goals", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({fields:getAllFields()})
        }).then(r=>r.text()).then(t=>{
            document.getElementById('goals').value = t;
            setStatus("Goals generated!", "green");
        }).catch(()=>setStatus("AI error", "red"));
    };
    </script>
</body>
</html>
